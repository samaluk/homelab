name: dclint
on:
  push:
    branches:
      - main
      - 'renovate/**'
  pull_request:
    branches:
      - main
jobs:
  dclint:
    name: dclint
    runs-on: ${{ fromJSON(vars.USE_SELF_HOSTED_RUNNERS == 'true' && vars.SELF_HOSTED_RUNNER_LABELS || '["ubuntu-latest"]') }}
    steps:
      - uses: actions/checkout@v7
      - name: Get Bun version from package.json
        id: bun-version
        run: echo "version=$(node -p "require('./package.json').packageManager.split('@')[1]")" >> $GITHUB_OUTPUT

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ steps.bun-version.outputs.version }}
      - run: bunx dclint . -r -c .dclintrc
