name: Komodo redeploy modified stacks

# Replaces the Komodo Action "ad-hoc: redeploy modified stacks".
# Komodo Actions abort with `getentropy failed` on this host's 3.10.x kernel
# (Deno inside komodo-core needs getrandom(2), added in Linux 3.17). The Komodo
# deploy API is unaffected, so this workflow drives Komodo from a modern kernel.
#
# Required repo/org secrets: KOMODO_URL, KOMODO_API_KEY, KOMODO_API_SECRET
# Optional repo variables:
#   KOMODO_EXCLUSION_TAG (default: "template") — stacks with this tag are skipped

on:
  push:
    branches: [main]
  schedule:
    # 06:00 UTC daily — drift reconciliation independent of pushes
    - cron: "0 6 * * *"
  workflow_dispatch: # manual run from the Actions tab

permissions:
  contents: read

jobs:
  redeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0 # need history to diff before..after on push

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Compute changed files
        id: diff
        # On push, diff before..after. For scheduled/manual runs there is no
        # single diff, so leave CHANGED_FILES empty — the script runs in drift
        # mode and queues every non-excluded stack for reconciliation.
        if: github.event_name == 'push'
        run: |
          before="${{ github.event.before }}"
          after="${{ github.event.after }}"
          # Force-pushed / first commit: fall back to drift mode.
          if [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          files=$(git diff --name-only --diff-filter=AMRD "$before" "$after" -- 2>/dev/null || true)
          {
            echo "changed<<EOF"
            echo "$files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Redeploy modified stacks
        env:
          KOMODO_URL: ${{ secrets.KOMODO_URL }}
          KOMODO_API_KEY: ${{ secrets.KOMODO_API_KEY }}
          KOMODO_API_SECRET: ${{ secrets.KOMODO_API_SECRET }}
          CHANGED_FILES: ${{ steps.diff.outputs.changed }}
        run: bun .github/scripts/redeploy-modified-stacks.ts
