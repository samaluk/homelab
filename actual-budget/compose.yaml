services:
  actual-ical:
    image: ghcr.io/samaluk/actual-ical:v0.5.10
    container_name: actual-ical
    volumes:
      - /volume1/docker/actual-ical:/app/.actual-cache
    environment:
      ACTUAL_SERVER: ${ACTUAL_URL}
      ACTUAL_MAIN_PASSWORD: ${ACTUAL_MAIN_PASSWORD}
      ACTUAL_SYNC_ID: ${ACTUAL_SYNC_ID}
      SYNC_ID_AS_URL: true
      TZ: America/Santiago
      LOCALE: es-CL
      CURRENCY: CLP
    env_file: .env
    ports:
      - '3030:3000'
  actual-server:
    image: actualbudget/actual-server:25.12.0
    container_name: actual-server

    volumes:
      - /volume1/docker/actual-budget/actual-data:/data:rw
    environment:
      - ACTUAL_PORT=5007
      - ACTUAL_UPLOAD_FILE_SYNC_SIZE_LIMIT_MB=50
      - ACTUAL_UPLOAD_SYNC_ENCRYPTED_FILE_SYNC_SIZE_LIMIT_MB=50
      - ACTUAL_UPLOAD_FILE_SIZE_LIMIT_MB=50
    ports:
      - '5007:5007'
    restart: unless-stopped

  actualtap:
    image: mattyfaz/actualtap:v1.0.21
    container_name: actualtap
    volumes:
      - /volume1/docker/actual-tap:/app/data
    environment:
      - TZ=America/Santiago
      - API_KEY=${ACTUAL_TAP_APIKEY}
      - ACTUAL_URL=${ACTUAL_URL}
      - ACTUAL_PASSWORD=${ACTUAL_MAIN_PASSWORD}
      - ACTUAL_SYNC_ID=${ACTUAL_SYNC_ID}
    env_file: .env
    ports:
      - '3333:3001'
    restart: always
