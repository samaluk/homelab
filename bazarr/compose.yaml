services:
  bazarr:
    image: linuxserver/bazarr:1.5.6@sha256:9a631194c0dee21c85b5bff59e23610e1ae2f54594e922973949d271102e585e
    container_name: bazarr
    volumes:
      - /volume1/docker/bazarr:/config:rw
      - /volume1/homes/plex:/media
    environment:
      - TZ=America/Santiago
      - PGID=100
      - PUID=1026
    ports:
      - '6767:6767'
    restart: on-failure:5
    healthcheck:
      test: curl -f http://localhost:6767/ || exit 1
    security_opt:
      - no-new-privileges:false
