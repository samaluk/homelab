services:
  bazarr:
    image: linuxserver/bazarr:1.5.6@sha256:95f27692c3de6dbe130cd035d342d8138ec74ade7b62cfc52e11ae222c52c855
    container_name: bazarr
    volumes:
      - /volume1/docker/bazarr:/config:rw
      - /volume1/homes/plex:/media
    environment:
      - TZ=America/Santiago
      - PGID=100
      - PUID=1026
    ports:
      - '6767:6767'
    restart: on-failure:5
    healthcheck:
      test: curl -f http://localhost:6767/ || exit 1
    security_opt:
      - no-new-privileges:false
