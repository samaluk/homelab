services:
  bazarr:
    image: linuxserver/bazarr:1.5.6@sha256:cb57afc3bd35558e1e7062658f9d4d18a0b4c474f10afe55f0ccfd867025f24f
    container_name: bazarr
    volumes:
      - /volume1/docker/bazarr:/config:rw
      - /volume1/homes/plex:/media
    environment:
      - TZ=America/Santiago
      - PGID=100
      - PUID=1026
    ports:
      - '6767:6767'
    restart: on-failure:5
    healthcheck:
      test: curl -f http://localhost:6767/ || exit 1
    security_opt:
      - no-new-privileges:false
