services:
  home-assistant:
    image: linuxserver/homeassistant:2026.6.2@sha256:0e3a35bba033636619f9fcd23cfbf579f0b414724bb1ad126afd6a202b6065db
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
