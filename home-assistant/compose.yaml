services:
  home-assistant:
    image: linuxserver/homeassistant:2026.5.4@sha256:22291ec925a885ac4940a4dceaf265a030a6f7aa3b0dd72c25062641796af623
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
