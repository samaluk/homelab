services:
  home-assistant:
    image: linuxserver/homeassistant:2026.4.4@sha256:4ed7b20403117de0790ab69cad56d2404b3d8ac4fdbe05bfc47e8ff5ebe0c1f7
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
