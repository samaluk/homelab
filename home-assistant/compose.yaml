services:
  home-assistant:
    image: linuxserver/homeassistant:2026.6.0@sha256:b00b67996868652decbfa5aca255a4b80e04a6203e80a0ac5c45c1cafd394be5
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
