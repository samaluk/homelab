services:
  home-assistant:
    image: linuxserver/homeassistant:2026.4.3@sha256:eed76dc0d5fea6853940af1b704f0399024f497a1349ebbe57e4cdcf6a45475b
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
