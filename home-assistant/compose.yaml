services:
  home-assistant:
    image: linuxserver/homeassistant:2026.6.4@sha256:21b85b512822424236cda5132abf869a1093d07d00122df3a2f66b6bbdf37adf
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
