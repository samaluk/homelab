services:
  home-assistant:
    image: linuxserver/homeassistant:2026.7.1@sha256:e443d191ba181dbcd3e0549b595a59c107a01cfe2c3581413aa62a75e304b96c
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
