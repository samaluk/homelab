services:
  home-assistant:
    image: linuxserver/homeassistant:2026.5.1@sha256:269a9950d761c573b26ef68f5af400a00a34d3934d6cae89fadd27aa04a626ca
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
