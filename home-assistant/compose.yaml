services:
  home-assistant:
    image: linuxserver/homeassistant:2026.5.4@sha256:8853a8333bb6faaae6c1ec12e5e6a550bf3ca3c811bb235a5ce56c219e78868c
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
