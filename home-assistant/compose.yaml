services:
  home-assistant:
    image: linuxserver/homeassistant:2026.5.0@sha256:cc5c77e0165750d16b61d081e397e32d6c11882b71d3962034aea4d7e9fba7cd
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
