services:
  home-assistant:
    image: linuxserver/homeassistant:2026.4.2@sha256:ca31b26f9c1e849898ec96f527eca834801e29990b8b2fc917e70f795f897f7b
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
