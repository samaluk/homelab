services:
  home-assistant:
    image: linuxserver/homeassistant:2026.6.4@sha256:6c2d67dee510d8bb159f371a39215d6a83d6bd77f479a50309212253cfe141a2
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
