services:
  home-assistant:
    image: linuxserver/homeassistant:2026.7.2@sha256:74b5e672a706ccc3c274147a7373df096f67b13cd7e9bfe65cf7c722f2acb201
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
