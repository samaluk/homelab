services:
  home-assistant:
    image: linuxserver/homeassistant:2026.4.4@sha256:05606bf34c86aa4d6cf75b7a7d9cac47e5e4568b26640b465f9c60e8d1f14192
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
