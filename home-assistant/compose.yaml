services:
  home-assistant:
    image: linuxserver/homeassistant:2026.4.1@sha256:e18abc102cdefba4290318409fd066b74647601512dce84a20aa9334dc68211a
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    privileged: true
    restart: unless-stopped
