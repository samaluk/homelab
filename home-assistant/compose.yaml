services:
  home-assistant:
    image: linuxserver/homeassistant:2026.5.1@sha256:053dc1649ecadb6e6227d435eb3fa270a29658ef2320a780790c629f42f749ee
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
