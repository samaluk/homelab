services:
  home-assistant:
    image: linuxserver/homeassistant:2026.6.1@sha256:cc62983eb672f844adb05d78ed0d14c33315053f5aa1e45f8407e3016c1e2dcb
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
