services:
  home-assistant:
    image: linuxserver/homeassistant:2026.5.3@sha256:be628cd7624ea1c33972385525817199bd5a93a2b2f2f0e555afc07e0bf4424b
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
