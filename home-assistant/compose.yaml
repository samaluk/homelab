services:
  home-assistant:
    image: linuxserver/homeassistant:2026.7.1@sha256:da6429a26e75175dcdae5f6f01e68a3660aa2cce953c2df6256a74fec1c0ffdb
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
