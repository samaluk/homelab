services:
  home-assistant:
    image: linuxserver/homeassistant:2026.3.4@sha256:ed782b14fb4072a059f51d1040c4e4cef2c55dd7a0139c96f70b0c56df29661d
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    privileged: true
    restart: unless-stopped
