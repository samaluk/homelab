services:
  home-assistant:
    image: linuxserver/homeassistant:2026.3.3@sha256:6f61133c85a89743a43823799a7ad6ea27c5d32f23f9805525831507ba24bc4e
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    privileged: true
    restart: unless-stopped
