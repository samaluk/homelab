services:
  home-assistant:
    image: linuxserver/homeassistant:2026.4.3@sha256:86529907d95a1b04c67331391c69728c90ad4bf2396bc34e0b0c5c0af53ad987
    container_name: home-assistant
    volumes:
      - /volume1/docker/home-assistant:/config
      - /etc/localtime:/etc/localtime:ro
    environment:
      PUID: 1026
      PGID: 100
      TZ: America/Santiago
    network_mode: host
    restart: unless-stopped
    privileged: true
