x-icloudpd-common: &icloudpd-common
  image: icloudpd/icloudpd:latest
  user: 1026:100
  environment:
    TZ: America/Santiago
  volumes:
    - /volume1/docker/icloud2/config:/config
    - /volume1/homes/SMaluk/Photos/icloud2:/data
  networks:
    - icloudpd_bridge

services:
  icloudpd:
    <<: *icloudpd-common
    container_name: icloudpd
    hostname: icloudpd
    command: >-
      icloudpd
      --directory /data
      --username ${APPLE_USERNAME}
      --cookie-directory /config/cookies
      --auto-delete
      --watch-with-interval 3600
      --password-provider webui
      --mfa-provider webui
      --no-progress-bar
    ports:
      - 8085:8080
    restart: unless-stopped

  icloudpd-auth:
    <<: *icloudpd-common
    container_name: icloudpd-auth
    hostname: icloudpd-auth
    profiles:
      - auth
    command: >-
      icloudpd
      --directory /data
      --username ${APPLE_USERNAME}
      --cookie-directory /config/cookies
      --auth-only
      --password-provider webui
      --mfa-provider webui
      --no-progress-bar
    ports:
      - 8086:8080
    restart: "no"

networks:
  icloudpd_bridge:
    driver: bridge
