services:
  icloudpd:
    image: boredazfcuk/icloudpd:1.0.1298_06-12-2025
    container_name: icloudpd
    volumes:
      - /volume1/docker/icloudpd/config/:/config
      - /volume1/homes/SMaluk/Photos/icloud:/home/smaluk/iCloud
    environment:
      TZ: America/Santiago
      UID: 1026
      GID: 100
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "/usr/local/bin/healthcheck.sh" ]
      interval: 10m
      timeout: 10s
      retries: 3
      start_period: 2m
