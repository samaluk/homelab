services:
  icloudpd:
    image: boredazfcuk/icloudpd:1.0.1341_23-02-2026
    container_name: icloudpd
    hostname: icloudpd
    volumes:
      - /volume1/docker/icloudpd/config/:/config
      - /volume1/homes/SMaluk/Photos/icloud:/home/smaluk/iCloud
    environment:
      TZ: America/Santiago
      UID: 1026
      GID: 100
    networks:
      - icloudpd_bridge
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "/usr/local/bin/healthcheck.sh" ]
      interval: 10m
      timeout: 10s
      retries: 3
      start_period: 2m

networks:
  icloudpd_bridge:
    driver: bridge
