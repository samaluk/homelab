services:
  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    container_name: immich_postgres
    volumes:
      # Do not edit the next line. If you want to change the database storage location on your system, edit the value of DB_DATA_LOCATION in the .env file
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    environment:
      TZ: America/Santiago
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: '--data-checksums'
      # Uncomment the DB_STORAGE_TYPE: 'HDD' var if your database isn't stored on SSDs
      DB_STORAGE_TYPE: 'HDD'
      PGID: 100
      PUID: 1026
    restart: always

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v3.0.2@sha256:412f68e46e1966d0f87a8733a430369ee184b3a83e7b1e2db536dff291a34aa7
    container_name: immich_machine_learning
    volumes:
      - /volume1/docker/immich/cache:/cache
      - /volume1/docker/immich/matplotlib:/usr/src/app/matplotlib
    environment:
      PGID: 100
      PUID: 1026
      MPLCONFIGDIR: /usr/src/app/matplotlib
    ports:
      - '3003:3003'
    restart: always
    healthcheck:
      disable: false
    # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, rocm, openvino, openvino-wsl, rknn] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    user: 1026:100

  immich-server:
    image: ghcr.io/immich-app/immich-server:v3.0.2@sha256:14390f3dc9512dc3273b12ccee6363d9be16c388699abc3f3fe0498bb9829937
    container_name: immich_server
    depends_on:
      - database
      - redis
    volumes:
      # Do not edit the next line. If you want to change the media storage location on your system, edit the value of UPLOAD_LOCATION in the .env file
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
      - ${ICLOUD_EXTERNAL_LIBRARY_PATH}:${ICLOUD_EXTERNAL_LIBRARY_PATH}:ro
    environment:
      TZ: America/Santiago
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: ${DB_DATABASE_NAME}
    ports:
      - '2283:2283'
    restart: always
    healthcheck:
      disable: false
    # extends:
    #   file: hwaccel.transcoding.yml
    #   service: cpu # set to one of [nvenc, quicksync, rkmpp, vaapi, vaapi-wsl] for accelerated transcoding
    user: 1026:100
  redis:
    image: docker.io/valkey/valkey:9@sha256:546304417feac0874c3dd576e0952c6bb8f06bb4093ea0c9ca303c73cf458f63
    container_name: immich_redis
    environment:
      TZ: 'America/Santiago'
      PGID: 100
      PUID: 1026
    ports:
      - '6381:6379'
    restart: always
    healthcheck:
      test: redis-cli ping || exit 1
