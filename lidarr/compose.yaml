services:
  db:
    image: postgres:18-alpine@sha256:fa206fb6391c039c6d3ac69791f60536d79ff19d1dc32eac7818f39fa5a4aa2e
    container_name: lidarr-db
    volumes:
      - /volume1/docker/lidarr/db:/var/lib/postgresql
      - /volume1/docker/lidarr/multiple-databases.sh:/docker-entrypoint-initdb.d/10-multiple-databases.sh:ro
    environment:
      POSTGRES_USER: lidarr
      POSTGRES_PASSWORD: lidarr
      POSTGRES_DB: lidarr-main
      POSTGRES_MULTIPLE_DATABASES: lidarr-log
    ports:
      - '5433:5432'
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lidarr -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
  lidarr:
    image: linuxserver/lidarr:3.1.0@sha256:7f34e2a907c7bcfc5cd49a1685db21a1e5055c96e8ad5e0d77ee94e1d50d84e5
    container_name: lidarr
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /volume1/homes/plex/Music:/music
      - /volume1/downloads:/downloads
      - /volume1/docker/lidarr/config:/config
    environment:
      TZ: America/Santiago
      PGID: 100
      PUID: 1026
    ports:
      - '8686:8686'
    restart: on-failure:5
    healthcheck:
      test: curl -f http://localhost:8686/ || exit 1
    security_opt:
      - no-new-privileges:true
