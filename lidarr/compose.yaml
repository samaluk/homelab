services:
  db:
    image: postgres:18-alpine@sha256:1b1689b20d16a014a3d195653381cf2caa75a41a92d93b255a9d6ea29fd353aa
    container_name: lidarr-db
    volumes:
      - /volume1/docker/lidarr/db:/var/lib/postgresql
      - /volume1/docker/lidarr/multiple-databases.sh:/docker-entrypoint-initdb.d/10-multiple-databases.sh:ro
    environment:
      POSTGRES_USER: lidarr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lidarr-main
      POSTGRES_MULTIPLE_DATABASES: lidarr-log
    ports:
      - '5433:5432'
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lidarr -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
  lidarr:
    image: linuxserver/lidarr:3.1.0@sha256:4ac390131993f3104a43c4abed79b8abd3227e2536f7b468877e5f41d9f54da4
    container_name: lidarr
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /volume1/homes/plex/Music:/music
      - /volume1/downloads:/downloads
      - /volume1/docker/lidarr/config:/config
    environment:
      TZ: America/Santiago
      PGID: 100
      PUID: 1026
    ports:
      - '8686:8686'
    restart: on-failure:5
    healthcheck:
      test: curl -f http://localhost:8686/ || exit 1
    security_opt:
      - no-new-privileges:true
