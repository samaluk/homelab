services:
  db:
    image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    container_name: lidarr-db
    volumes:
      - /volume1/docker/lidarr/db:/var/lib/postgresql
      - /volume1/docker/lidarr/multiple-databases.sh:/docker-entrypoint-initdb.d/10-multiple-databases.sh:ro
    environment:
      POSTGRES_USER: lidarr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: lidarr-main
      POSTGRES_MULTIPLE_DATABASES: lidarr-log
    ports:
      - '5433:5432'
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lidarr -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
  lidarr:
    image: linuxserver/lidarr:3.1.0@sha256:f60ee67694bc4a218efe0fb2dc0b0021d193ac5f15be2638d17ab4eeb6966946
    container_name: lidarr
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - /volume1/homes/plex/Music:/music
      - /volume1/downloads:/downloads
      - /volume1/docker/lidarr/config:/config
    environment:
      TZ: America/Santiago
      PGID: 100
      PUID: 1026
    ports:
      - '8686:8686'
    restart: on-failure:5
    healthcheck:
      test: curl -f http://localhost:8686/ || exit 1
    security_opt:
      - no-new-privileges:true
