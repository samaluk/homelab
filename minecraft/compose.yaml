services:
  minecraft:
    image: marctv/minecraft-papermc-server:1.21.11@sha256:eeebb757d33881918eb6eaa05d20e706d4d624f6c0ed9d3cb730617762acd398
    container_name: "minecraft-server-paper"
    volumes:
      - /volume1/docker/minecraft/data:/data
    environment:
      MEMORYSIZE: "1G"
      PAPERMC_FLAGS: ""
    ports:
      - '25565:25565'
    stdin_open: true
    tty: true
