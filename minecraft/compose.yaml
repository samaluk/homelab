services:
  minecraft:
    image: marctv/minecraft-papermc-server:26.1.2@sha256:cbf14dfb4d4399e19d38a70435d94fb0be6c62f41c62989693aacd9dc0323905
    container_name: "minecraft-server-paper"
    volumes:
      - /volume1/docker/minecraft/data:/data
    environment:
      MEMORYSIZE: "1G"
      PAPERMC_FLAGS: ""
    ports:
      - '25565:25565'
    stdin_open: true
    tty: true
