services:
  minecraft:
    image: marctv/minecraft-papermc-server:26.1.1@sha256:6bd9c8094c40b9ede31110db9171e6f269c3fe9b9f37e45818fd3252b9d86e71
    container_name: "minecraft-server-paper"
    volumes:
      - /volume1/docker/minecraft/data:/data
    environment:
      MEMORYSIZE: "1G"
      PAPERMC_FLAGS: ""
    ports:
      - '25565:25565'
    stdin_open: true
    tty: true
