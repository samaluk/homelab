services:
  minecraft:
    image: marctv/minecraft-papermc-server:26.1.2@sha256:3977e918901afcd5c47eb6482d4786a02e7e837b0915ca3af38c4762b177a347
    container_name: "minecraft-server-paper"
    volumes:
      - /volume1/docker/minecraft/data:/data
    environment:
      MEMORYSIZE: "1G"
      PAPERMC_FLAGS: ""
    ports:
      - '25565:25565'
    stdin_open: true
    tty: true
