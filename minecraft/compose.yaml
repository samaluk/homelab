services:
  minecraft:
    image: marctv/minecraft-papermc-server:1.21.11@sha256:b88e71d3c6e720124d06ac4ba6ce3030be34355a5701c0a82a84a3ba8f704e5a
    container_name: "minecraft-server-paper"
    volumes:
      - /volume1/docker/minecraft/data:/data
    environment:
      MEMORYSIZE: "1G"
      PAPERMC_FLAGS: ""
    ports:
      - '25565:25565'
    stdin_open: true
    tty: true
