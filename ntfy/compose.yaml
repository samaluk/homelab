services:
  ntfy:
    image: binwiederhier/ntfy:v2.26@sha256:a6d335064ae927c4dbef118e1fa39656b3d2e01472b2a82af5915d5cebfe815f
    container_name: ntfy

    volumes:
      - /volume1/docker/ntfy/cache:/var/cache/ntfy:rw
      - /volume1/docker/ntfy:/etc/ntfy:rw
    environment:
      - TZ=America/Santiago
    ports:
      - '6741:80'
    command:
      - serve
    restart: on-failure:5
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
