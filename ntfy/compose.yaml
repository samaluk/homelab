services:
  ntfy:
    image: binwiederhier/ntfy:v2.20@sha256:34e68dedfe6f324f30d4b07081a2a69a58d7299a289e1bc4a89081a4432bf1e9
    container_name: ntfy

    volumes:
      - /volume1/docker/ntfy/cache:/var/cache/ntfy:rw
      - /volume1/docker/ntfy:/etc/ntfy:rw
    environment:
      - TZ=America/Santiago
    ports:
      - '6741:80'
    command:
      - serve
    restart: on-failure:5
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
