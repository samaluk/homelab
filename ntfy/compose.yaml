services:
  ntfy:
    image: binwiederhier/ntfy:v2.23@sha256:b32b4221a64ec2e7c000f0782b2feef24022e1a09a24e531640f4cbba6cfa1e6
    container_name: ntfy

    volumes:
      - /volume1/docker/ntfy/cache:/var/cache/ntfy:rw
      - /volume1/docker/ntfy:/etc/ntfy:rw
    environment:
      - TZ=America/Santiago
    ports:
      - '6741:80'
    command:
      - serve
    restart: on-failure:5
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 40s
