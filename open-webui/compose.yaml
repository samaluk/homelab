services:
  open-webui:
    image: openwebui/open-webui:0.9.5@sha256:e045bde3b004cc7f8c319412345eb56c87ea6ac57031534a31ca37ad5424beb3
    container_name: open-webui
    volumes:
      - /volume1/docker/open-webui/data:/app/backend/data
    environment:
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - WEBUI_URL=https://llm.malukzedan.synology.me
      - CORS_ALLOW_ORIGIN=https://llm.malukzedan.synology.me
      - ENABLE_SIGNUP=false
      - ENABLE_COMPRESSION_MIDDLEWARE=false
    ports:
      - '8087:8080'
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://127.0.0.1:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    pull_policy: always
