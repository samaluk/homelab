services:
  overseerr:
     image: sctx/overseerr:latest
     container_name: overseerr
     environment:
       - TZ=America/Santiago
       - PORT=5055
       - PUID=1026
       - PGID=100
     ports:
       - 5055:5055
     volumes:
       - /volume1/docker/overseerr:/app/config
     restart: unless-stopped
