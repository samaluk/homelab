services:
  plex:
    image: plexinc/pms-docker:1.43.3.10828-00f62d37d@sha256:a2b03d75aa16f422488c692935cab476d966b75f2af3c93bb6d910c6051906f5
    container_name: plex
    volumes:
      - /volume1/docker/plex:/config
      - /volume1/homes/plex/TV Shows:/tv
      - /volume1/homes/plex/Movies:/movies
      - /volume1/homes/plex/Music:/music
      - /volume1/homes/plex/Rugby:/rugby
    environment:
      - PLEX_UID=1026
      - PLEX_GID=100
      - TZ=America/Santiago
      - VERSION=public
    network_mode: host
    restart: unless-stopped
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card0:/dev/dri/card0
