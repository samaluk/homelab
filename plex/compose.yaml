services:
  plex:
    image: plexinc/pms-docker:1.43.0.10492-121068a07@sha256:b59f6e65a3ec5fad1f5ad417f9911340b71f34efe333338429eeb2dbac5e524e
    container_name: plex
    volumes:
      - /volume1/docker/plex:/config
      - /volume1/homes/plex/TV Shows:/tv
      - /volume1/homes/plex/Movies:/movies
      - /volume1/homes/plex/Music:/music
      - /volume1/homes/plex/Rugby:/rugby
    environment:
      - PLEX_UID=1026
      - PLEX_GID=100
      - TZ=America/Santiago
      - VERSION=public
    network_mode: host
    restart: unless-stopped
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card0:/dev/dri/card0
