services:
  prowlarr:
    image: linuxserver/prowlarr:2.4.0@sha256:536036aeb2c740d1a660ccf143b58a8bd6222f09010258fdfc10a538af7bec78
    container_name: prowlarr
    volumes:
      - /volume1/docker/prowlarr:/config:rw
    environment:
      TZ: America/Santiago
      PGID: 100
      PUID: 1026
    ports:
      - '9696:9696'
    restart: on-failure:5
    healthcheck:
      test: curl -f http://localhost:9696/ || exit 1
    security_opt:
      - no-new-privileges:true
