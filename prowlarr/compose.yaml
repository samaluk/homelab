services:
  prowlarr:
    image: linuxserver/prowlarr:2.3.5@sha256:c9fe528f34b1fd3715438b6f6d6991d64e2965f2c055db36398bc66a0e7eab01
    container_name: prowlarr
    volumes:
      - /volume1/docker/prowlarr:/config:rw
    environment:
      TZ: America/Santiago
      PGID: 100
      PUID: 1026
    ports:
      - '9696:9696'
    restart: on-failure:5
    healthcheck:
      test: curl -f http://localhost:9696/ || exit 1
    security_opt:
      - no-new-privileges:true
