services:
  prowlarr:
    image: linuxserver/prowlarr:2.3.5@sha256:6df73ab9e99d0dbaad27c39d8a47c600333eebea80fcb56253a0bb8b630c8115
    container_name: prowlarr
    volumes:
      - /volume1/docker/prowlarr:/config:rw
    environment:
      TZ: America/Santiago
      PGID: 100
      PUID: 1026
    ports:
      - '9696:9696'
    restart: on-failure:5
    healthcheck:
      test: curl -f http://localhost:9696/ || exit 1
    security_opt:
      - no-new-privileges:true
