services:
  radarr:
    image: linuxserver/radarr:6.2.1@sha256:28852d0eacababc206762af48fe86d78594a4f434cc46b358f9764a857098662
    container_name: radarr
    volumes:
      - /volume1/downloads:/downloads
      - /volume1/homes/plex/Movies:/movies
      - /volume1/docker/radarr/config:/config
    environment:
      TZ: America/Santiago
      PGID: 100
      PUID: 1026
    ports:
      - '7878:7878'
    restart: on-failure:5
    healthcheck:
      test: curl -f http://localhost:7878/ || exit 1
    security_opt:
      - no-new-privileges:true
