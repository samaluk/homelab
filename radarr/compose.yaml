services:
  radarr:
    image: linuxserver/radarr:6.1.1@sha256:6f1dda18354ea7f28cead8f6d099fc8222498c3ae165f567d504ed04d70980d7
    container_name: radarr
    volumes:
      - /volume1/downloads:/downloads
      - /volume1/homes/plex/Movies:/movies
      - /volume1/docker/radarr/config:/config
    environment:
      TZ: America/Santiago
      PGID: 100
      PUID: 1026
    ports:
      - '7878:7878'
    restart: on-failure:5
    healthcheck:
      test: curl -f http://localhost:7878/ || exit 1
    security_opt:
      - no-new-privileges:true
