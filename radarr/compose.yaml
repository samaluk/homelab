services:
  radarr:
    image: linuxserver/radarr:6.1.1@sha256:15417a594ebda4c660a9fa9748e7199d33e2d17b31bbc5ad7ba2e86f0b414763
    container_name: radarr
    volumes:
      - /volume1/downloads:/downloads
      - /volume1/homes/plex/Movies:/movies
      - /volume1/docker/radarr/config:/config
    environment:
      TZ: America/Santiago
      PGID: 100
      PUID: 1026
    ports:
      - '7878:7878'
    restart: on-failure:5
    healthcheck:
      test: curl -f http://localhost:7878/ || exit 1
    security_opt:
      - no-new-privileges:true
