services:
  seerr:
    image: seerr/seerr:v3.2.0@sha256:c4cbd5121236ac2f70a843a0b920b68a27976be57917555f1c45b08a1e6b2aad
    container_name: seerr
    volumes:
      - /volume1/docker/seerr:/app/config
    environment:
      - TZ=America/Santiago
      - PORT=5055
      - PUID=1026
      - PGID=100
    ports:
      - '5055:5055'
    restart: unless-stopped
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    init: true
