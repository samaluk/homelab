services:
  seerr:
    image: seerr/seerr:v3.1.1@sha256:d535391db3b5a22ce02241e6d7a50ca714e75d927e46aa20456b77fa051cbf52
    container_name: seerr
    volumes:
      - /volume1/docker/seerr:/app/config
    environment:
      - TZ=America/Santiago
      - PORT=5055
      - PUID=1026
      - PGID=100
    ports:
      - '5055:5055'
    restart: unless-stopped
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    init: true
