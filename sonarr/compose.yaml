services:
  sonarr:
    image: linuxserver/sonarr:4.0.19@sha256:fbb15bb4fb14d1ffe017f6be0e3fed8f1b300e4687e329767da0b61f36ba1eed
    container_name: sonarr
    volumes:
      - /volume1/downloads:/downloads
      - /volume1/homes/plex/TV Shows:/movies
      - /volume1/docker/sonarr/config:/config
    environment:
      TZ: America/Santiago
      PGID: 100
      PUID: 1026
    ports:
      - '8989:8989'
    restart: on-failure:5
    healthcheck:
      test: curl -f http://localhost:8989/ || exit 1
    security_opt:
      - no-new-privileges:true
