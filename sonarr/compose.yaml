services:
  sonarr:
    image: ghcr.io/linuxserver/sonarr:4.0.17@sha256:76414c033f290d3c9f1f9dfad71150abe71d92592369a3377a5903d579e6e2b2
    container_name: sonarr
    volumes:
      - /volume1/downloads:/downloads
      - /volume1/homes/plex/TV Shows:/movies
      - /volume1/docker/sonarr/config:/config
    environment:
      TZ: America/Santiago
      PGID: 100
      PUID: 1026
    ports:
      - '8989:8989'
    restart: on-failure:5
    healthcheck:
      test: curl -f http://localhost:8989/ || exit 1
    security_opt:
      - no-new-privileges:true
