services:
  uptime-kuma:
    image: louislam/uptime-kuma:2.3.0@sha256:a8e5e69ce185d5425fcbf2ab14ddf808df5651fb2747a46a17cecf8ed5fd1af2
    container_name: uptime-kuma
    volumes:
      - /volume1/docker/uptime-kuma:/app/data:rw
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: America/Santiago
    ports:
      - '3444:3001'
    restart: on-failure:5
    cpu_shares: 1024
    hostname: uptimekuma
    mem_limit: 4g
