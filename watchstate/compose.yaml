services:
  watchstate:
    image: arabcoders/watchstate:lastest
    container_name: watchstate
    volumes:
      - /volume1/docker/watchstate:/config:rw
    environment:
      - DISABLE_CACHE=1
      - PHPC_JIT=0
      - PHP_OPCACHE_JIT_BUFFER_SIZE=0
    ports:
      - '9090:8080'
    restart: unless-stopped
    user: 1026:100
