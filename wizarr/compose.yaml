services:
  wizarr:
    image: ghcr.io/wizarrrr/wizarr:v2026.7.1@sha256:606f9b88b0303daae11f595e424756b588d9365021c53dcb4d1369f2efc0543c
    container_name: wizarr
    volumes:
      - /volume1/docker/wizarr:/data
    environment:
      - PUID=1026
      - PGID=100
      - DISABLE_BUILTIN_AUTH=false
      - TZ=America/Santiago
    ports:
      - '5690:5690'
    restart: unless-stopped
    healthcheck:
      test: curl -f http://localhost:5690/ || exit 1
      start_period: 30s
      timeout: 5s
      interval: 30s
      retries: 3
